<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#ffffff"/>

  <!-- Leaf green (top) -->
  <ellipse cx="248" cy="148" rx="72" ry="26" transform="rotate(-42 248 148)" fill="#7ab648"/>
  <ellipse cx="248" cy="148" rx="72" ry="26" transform="rotate(-42 248 148)" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- Leaf blue (right) -->
  <ellipse cx="318" cy="205" rx="72" ry="26" transform="rotate(78 318 205)" fill="#4ba3c3"/>
  <ellipse cx="318" cy="205" rx="72" ry="26" transform="rotate(78 318 205)" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- Leaf brown (bottom) -->
