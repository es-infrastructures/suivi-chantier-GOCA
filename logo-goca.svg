  <ellipse cx="250" cy="258" rx="72" ry="26" transform="rotate(198 250 258)" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- GOCA text -->
  <text x="256" y="430" font-family="Arial Black, Helvetica, sans-serif" font-size="148" font-weight="900" fill="#333333" text-anchor="middle" letter-spacing="-4">goca</text>
